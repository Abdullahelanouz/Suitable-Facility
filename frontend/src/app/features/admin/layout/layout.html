<div class="admin-wrapper" [class.collapsed]="isSidebarCollapsed">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <img src="assets/logo.png" alt="Logo" width="40px">
            <span class="brand-text">Admin Panel</span>
        </div>

        <nav class="sidebar-nav">
            <a routerLink="overview" routerLinkActive="active" class="nav-item">
                <i class="fa-solid fa-chart-line"></i>
                <span class="nav-text">Overview</span>
            </a>
            <a routerLink="users" routerLinkActive="active" class="nav-item">
                <i class="fa-solid fa-users"></i>
                <span class="nav-text">Users</span>
            </a>
            <a routerLink="bookings" routerLinkActive="active" class="nav-item">
                <i class="fa-solid fa-calendar-check"></i>
                <span class="nav-text">Bookings</span>
            </a>
            <a routerLink="uae-inquiries" routerLinkActive="active" class="nav-item">
                <i class="fa-solid fa-map-location-dot"></i>
                <span class="nav-text">UAE Inquiries</span>
            </a>
            <a routerLink="messages" routerLinkActive="active" class="nav-item">
                <i class="fa-solid fa-envelope"></i>
                <span class="nav-text">Messages</span>
            </a>
            <a routerLink="/" class="nav-item">
                <i class="fa-solid fa-globe"></i>
                <span class="nav-text">Visit Site</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button (click)="logout()" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="nav-text">Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <button (click)="toggleSidebar()" class="btn-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="header-user">
                <span class="user-name">{{ (authService.currentUser$ | async)?.name }}</span>
                <div class="user-avatar">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
            </div>
        </header>

        <div class="content-body">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
